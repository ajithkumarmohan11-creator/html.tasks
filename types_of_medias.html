<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Tags Task</title>
</head>
<body>

    <table border="1" align="center" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th colspan="3"><h2>Media Tags</h2></th>
            </tr>
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Output</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Image</td>
                <td align="center">
                    <img src="ajith_image.jpg" alt="Ajithkumar M" width="300">
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Audio</td>
                <td align="center">
                    <audio controls>
                        <source src="ajith_audio.mp3" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </td>
            </tr>

            <tr>
                <td>3</td>
                <td>Video</td>
                <td align="center">
                    <video width="320" height="240" controls>
                        <source src="ajith_video_song.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </td>
            </tr>

            <tr>
                <td>4</td>
                <td>Iframe</td>
                <td align="center">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/a7rCc_oMUhI?si=1VZfK875c8nL-edj" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>"
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
